name: "Stale Issue Detector"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been automatically marked as stale because it has not had activity in 14 days. It will be closed in 7 days if no further activity occurs."
          stale-pr-message: "This PR has been automatically marked as stale because it has not had activity in 14 days. It will be closed in 7 days if no further activity occurs."
          days-before-stale: 14
          days-before-close: 21
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,in-progress,blocked"
          exempt-pr-labels: "pinned,in-progress,blocked"

